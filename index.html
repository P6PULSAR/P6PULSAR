<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSAR — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--s1:#ffffff;--s2:#f5f7fa;--s3:#eaecf0;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);
  --tx:#1a1f2e;--mu:#7a8399;--mu2:#4a5268;
  --blue:#1a6fe8;--red:#d93535;--grn:#0f9e76;--ylw:#c47f00;--pur:#6b48d4;
  --r:8px;--rl:14px;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

/* NAV — same bar as the app, so the gate feels like part of Pulsar, not a separate product */
nav{display:flex;align-items:center;padding:.85rem 1.5rem;background:var(--s1);border-bottom:1px solid var(--bd)}
.nav-logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:.8rem;font-weight:500;letter-spacing:.05em}
.nav-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#4a8fff,#2ecfa0);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-mark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.gate-wrap{width:100%;max-width:430px}

.gate-hero{text-align:center;padding:0 1rem 1.6rem}
.gate-hero-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#4a8fff,#2ecfa0);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.gate-hero-mark svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.gate-hero-title{font-size:1.3rem;font-weight:700;color:var(--tx);letter-spacing:.03em}
.gate-hero-sub{font-size:.85rem;color:var(--mu);margin-top:6px;line-height:1.5}

.gate-panel{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:1.6rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.gate-field{margin-bottom:.9rem}
.gate-label{font-size:.68rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.gate-input{width:100%;padding:.55rem .7rem;font-size:.82rem;font-family:var(--font);border:1px solid var(--bd2);border-radius:var(--r);background:var(--s2);color:var(--tx);outline:none;transition:border-color .15s,background .15s}
.gate-input:focus{border-color:var(--blue);background:var(--s1)}
.gate-input::placeholder{color:var(--mu)}
.gate-err{font-size:.68rem;color:var(--red);margin-top:4px;min-height:1em}

.gate-btn{width:100%;padding:.65rem 1rem;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:.85rem;font-weight:500;font-family:var(--font);cursor:pointer;transition:background .15s;margin-top:.3rem}
.gate-btn:hover{background:#1558bf}
.gate-btn:disabled{background:var(--mu);cursor:not-allowed}

.gate-msg{font-size:.76rem;color:var(--mu2);text-align:center;line-height:1.6;padding:.4rem 0}
.gate-msg.ok{color:var(--grn)}
.gate-msg.err{color:var(--red)}

.gate-icon-badge{width:44px;height:44px;border-radius:50%;background:rgba(15,158,118,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.gate-icon-badge svg{width:22px;height:22px;stroke:var(--grn);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.gate-footnote{font-size:.68rem;color:var(--mu);text-align:center;margin-top:1rem;line-height:1.6}
.gate-resend{color:var(--blue);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font);font-size:.68rem;padding:0}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-mark"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span>PULSAR</span>
  </div>
</nav>

<main>
  <div class="gate-wrap">

    <div class="gate-hero">
      <div class="gate-hero-mark"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="gate-hero-title">Welcome to PULSAR</div>
      <div class="gate-hero-sub">Schedule Intelligence Platform — tell us a little about yourself and we'll email you a secure link in</div>
    </div>

    <div class="gate-panel">

      <!-- STEP 1: details form -->
      <form id="gateForm">
        <div class="gate-field">
          <label class="gate-label" for="gName">Full name</label>
          <input class="gate-input" id="gName" type="text" placeholder="Jane Smith" autocomplete="name" required>
        </div>
        <div class="gate-field">
          <label class="gate-label" for="gPhone">Contact number</label>
          <input class="gate-input" id="gPhone" type="tel" placeholder="+1 555 123 4567" autocomplete="tel" required>
        </div>
        <div class="gate-field">
          <label class="gate-label" for="gEmail">Work email</label>
          <input class="gate-input" id="gEmail" type="email" placeholder="jane@company.com" autocomplete="email" required>
          <div class="gate-err" id="gErr"></div>
        </div>
        <button class="gate-btn" id="gSubmit" type="submit">Send verification link</button>
      </form>

      <!-- STEP 2: "check your email" state (hidden until form submits) -->
      <div id="gateSent" style="display:none;text-align:center">
        <div class="gate-icon-badge"><svg viewBox="0 0 24 24"><path d="M21 5v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5"/><path d="m2 5 10 8 10-8"/><path d="M2 5h20"/></svg></div>
        <div class="gate-msg ok" id="gateSentMsg" style="font-weight:500"></div>
        <div class="gate-footnote">Didn't get it? Check spam, or <button class="gate-resend" id="gResend" type="button">resend the link</button>.</div>
      </div>

      <!-- STEP 3: completing sign-in from the emailed link -->
      <div id="gateVerifying" style="display:none;text-align:center">
        <div class="gate-msg"><span class="spinner" style="border-color:rgba(26,111,232,.25);border-top-color:var(--blue)"></span>Verifying your email…</div>
      </div>

    </div>

    <div class="gate-footnote">Your details are used only to grant access to PULSAR and are never shared.</div>
  </div>
</main>

<!-- ══════════════════════════════════════
     Firebase — email-link verification + lead capture
     No backend to run: Firebase's SDK talks directly to
     Google's servers from the browser.
══════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── PASTE YOUR OWN FIREBASE CONFIG HERE (Firebase Console → Project settings → your web app) ───
const firebaseConfig = {
  apiKey: "AIzaSyCJILlwk9htPaBTN9ZJETsvcvL5Xmeovio",
  authDomain: "p6pulsar.firebaseapp.com",
  projectId: "p6pulsar",
  storageBucket: "p6pulsar.firebasestorage.app",
  messagingSenderId: "488821078509",
  appId: "1:488821078509:web:76cdd3a7f116738e478fe4"
};
// ──────────────────────────────────────────────────────────────────────────────────────────────

// Where the verified user lands once the link is clicked.
const APP_URL = 'app.html';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form        = document.getElementById('gateForm');
const submitBtn   = document.getElementById('gSubmit');
const errEl       = document.getElementById('gErr');
const sentPanel   = document.getElementById('gateSent');
const sentMsg     = document.getElementById('gateSentMsg');
const verifyPanel = document.getElementById('gateVerifying');
const resendBtn   = document.getElementById('gResend');

const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function showOnly(el){
  [form, sentPanel, verifyPanel].forEach(p => p.style.display = 'none');
  el.style.display = 'block';
}

// Already verified in a previous visit on this device? Skip straight through.
if (localStorage.getItem('pulsarVerified') === 'true' && !isSignInWithEmailLink(auth, window.location.href)) {
  window.location.href = APP_URL;
}

// Arriving back here via the emailed link — complete sign-in.
if (isSignInWithEmailLink(auth, window.location.href)) {
  showOnly(verifyPanel);
  let email = window.localStorage.getItem('pulsarEmail');
  if (!email) {
    email = window.prompt('Please confirm the email address you used:');
  }
  signInWithEmailLink(auth, email, window.location.href)
    .then(() => {
      localStorage.setItem('pulsarVerified', 'true');
      window.location.href = APP_URL;
    })
    .catch(() => {
      showOnly(form);
      errEl.textContent = 'That link has expired or is invalid — please request a new one below.';
    });
}

async function sendLink(name, phone, email) {
  const actionCodeSettings = {
    url: window.location.origin + window.location.pathname,
    handleCodeInApp: true
  };
  await addDoc(collection(db, 'leads'), { name, phone, email, ts: serverTimestamp() });
  await sendSignInLinkToEmail(auth, email, actionCodeSettings);
  window.localStorage.setItem('pulsarEmail', email);
  window.localStorage.setItem('pulsarName', name);
  window.localStorage.setItem('pulsarPhone', phone);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';

  const name  = document.getElementById('gName').value.trim();
  const phone = document.getElementById('gPhone').value.trim();
  const email = document.getElementById('gEmail').value.trim();

  if (!name || !phone || !email) { errEl.textContent = 'Please fill in every field.'; return; }
  if (!EMAIL_RE.test(email))     { errEl.textContent = 'Please enter a valid email address.'; return; }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Sending…';

  try {
    await sendLink(name, phone, email);
    sentMsg.textContent = 'Check your inbox — we sent a sign-in link to ' + email + '.';
    showOnly(sentPanel);
  } catch (err) {
    errEl.textContent = 'Something went wrong sending your link. Please try again.';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send verification link';
  }
});

resendBtn.addEventListener('click', async () => {
  const name  = localStorage.getItem('pulsarName')  || '';
  const phone = localStorage.getItem('pulsarPhone') || '';
  const email = localStorage.getItem('pulsarEmail') || '';
  resendBtn.textContent = 'Sending…';
  try {
    await sendLink(name, phone, email);
    sentMsg.textContent = 'Sent again — check your inbox for ' + email + '.';
  } finally {
    resendBtn.textContent = 'resend the link';
  }
});
</script>
</body>
</html>
